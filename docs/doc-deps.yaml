# Documentation Dependency Map
# Maps source files to documentation that may need updating when the source changes.
# Consumed by /docs-impact skill and referenced in CLAUDE.md.
#
# Relationship types:
#   methodology    - REGISTRY.md section (update if algorithm/edge-case behavior changes)
#   tutorial       - Jupyter notebook demonstrating the feature
#   api_reference  - Sphinx RST auto-generated from docstrings (update if signature/docstring changes)
#   user_guide     - README.md, llms*.txt, choosing_estimator.rst sections
#   roadmap        - survey-roadmap.md (ROADMAP.md is surfaced globally by /docs-impact)
#   performance    - benchmarks.rst, performance-plan.md
#   internal       - CLAUDE.md, CONTRIBUTING.md (developer-facing)
#
# Drift risk levels:
#   high   - historically drifts or has dense cross-references
#   medium - moderate cross-references, changes occasionally
#   low    - stable relationship, rarely needs updating

# ──────────────────────────────────────────────────────────────────────
# Groups: multi-file modules that share documentation dependencies.
# Members resolve to the first entry (the primary module) for doc lookup.
# ────────────���─────────────────────────────────────────────────────────
groups:
  staggered:
    - diff_diff/staggered.py
    - diff_diff/staggered_aggregation.py
    - diff_diff/staggered_bootstrap.py
    - diff_diff/staggered_results.py
  staggered_triple_diff:
    - diff_diff/staggered_triple_diff.py
    - diff_diff/staggered_triple_diff_results.py
  trop:
    - diff_diff/trop.py
    - diff_diff/trop_global.py
    - diff_diff/trop_local.py
    - diff_diff/trop_results.py
  imputation:
    - diff_diff/imputation.py
    - diff_diff/imputation_bootstrap.py
    - diff_diff/imputation_results.py
  two_stage:
    - diff_diff/two_stage.py
    - diff_diff/two_stage_bootstrap.py
    - diff_diff/two_stage_results.py
  efficient_did:
    - diff_diff/efficient_did.py
    - diff_diff/efficient_did_bootstrap.py
    - diff_diff/efficient_did_covariates.py
    - diff_diff/efficient_did_results.py
    - diff_diff/efficient_did_weights.py
  continuous_did:
    - diff_diff/continuous_did.py
    - diff_diff/continuous_did_bspline.py
    - diff_diff/continuous_did_results.py
  stacked_did:
    - diff_diff/stacked_did.py
    - diff_diff/stacked_did_results.py
  wooldridge:
    - diff_diff/wooldridge.py
    - diff_diff/wooldridge_results.py
  visualization:
    - diff_diff/visualization/__init__.py
    - diff_diff/visualization/_common.py
    - diff_diff/visualization/_continuous.py
    - diff_diff/visualization/_diagnostic.py
    - diff_diff/visualization/_event_study.py
    - diff_diff/visualization/_power.py
    - diff_diff/visualization/_staggered.py
    - diff_diff/visualization/_synthetic.py

